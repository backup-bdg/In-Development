services:
  # Backend service for ML model
  - type: web
    name: backdoor-ai-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: info
      - key: MODEL_DATA_PATH
        value: /tmp/model
    # Note: Using /tmp for storage since disk is not available in free tier
    # The app will download the model on startup if it doesn't exist
    healthCheckPath: /
    buildCommand: python download_model.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

  # Frontend service
  - type: web
    name: backdoor-ai-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: backdoor-ai-backend
          type: web
          property: host
