version: '3.8'

services:
  # Backend service for ML model
  backend:
    build: ./backend
    container_name: backdoor-ai-backend
    ports:
      - "8000:8000"
    volumes:
      - model-data:/app/app/model
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=info
      - MODEL_DATA_PATH=/app/app/model
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend service
  frontend:
    build: ./frontend
    container_name: backdoor-ai-frontend
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  model-data:
    driver: local
